name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build Docker image
        run: |
          docker build -t flask-devops-app .

      - name: Tag image
        run: |
          docker tag flask-devops-app:latest ${{ secrets.ECR_REGISTRY }}/flask-devops-app:latest

      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/flask-devops-app:latest

      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop flask-app || true
            docker rm flask-app || true
            docker pull ${{ secrets.ECR_REGISTRY }}/flask-devops-app:latest
            docker run -d -p 80:5000 --name flask-app \
              ${{ secrets.ECR_REGISTRY }}/flask-devops-app:latest